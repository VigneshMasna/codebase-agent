# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — single-command build + run for codebase-agent
#
# Usage:
#   docker compose up --build          # build image and start
#   docker compose up -d               # start in background (after first build)
#   docker compose down                # stop (volumes preserved)
#   docker compose down -v             # stop AND delete volumes (re-downloads models)
#
# Prerequisites:
#   - .env file must exist at project root (copy .env.example and fill in values)
#   - gcp-credentials.json must exist at project root
#
# First startup note:
#   GraphCodeBERT (C + Java) and all-MiniLM-L6-v2 are downloaded from
#   HuggingFace Hub on first run (~1 GB total, ~5–10 min depending on connection).
#   Models are cached in the `hf_model_cache` named volume — subsequent starts
#   are fast (cache hit, no network needed).
# ─────────────────────────────────────────────────────────────────────────────

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8080:8080"

    # Load all runtime env vars from .env (Neo4j, GCP, Gemini, etc.)
    # Variables in `environment` below take precedence over .env for conflicts.
    env_file:
      - .env

    environment:
      # Override the relative GCP credentials path from .env with the absolute
      # container path so Google libraries find the file regardless of CWD.
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcp-credentials.json

      # HuggingFace model cache directory (mapped to a named volume below)
      HF_HOME: /app/.hf_cache

      # Uvicorn bind port
      PORT: "8080"

      # Persist chat sessions to the sessions volume so conversations survive
      # container restarts (the default path would be /app/.chat_sessions.json)
      SESSIONS_FILE: /app/sessions/chat_sessions.json

    volumes:
      # GCP service account credentials — mounted read-only at runtime.
      # NEVER baked into the image.
      - ./gcp-credentials.json:/app/gcp-credentials.json:ro

      # HuggingFace model cache — survives `docker compose down`.
      # Delete with `docker compose down -v` to force a fresh model download.
      - hf_model_cache:/app/.hf_cache

      # Chat session persistence — survives container restarts.
      - sessions_data:/app/sessions

    restart: unless-stopped


# ─── Named volumes ────────────────────────────────────────────────────────────
volumes:
  # Persists HuggingFace model downloads (~1 GB) across container restarts.
  # Managed by Docker; stored in /var/lib/docker/volumes/ on Linux,
  # or within the Docker Desktop VM on Windows/macOS.
  hf_model_cache:

  # Persists chat conversation sessions across container restarts.
  sessions_data:
